# Ansible Pi Cluster Inventory
# ============================
# Edit this file with your actual IP addresses!
#
# Default network topology:
#   rpi02.local - Load Balancer / DNS
#   rk01.local - Controller (Monitoring Hub)
#   rk01.local - Storage Controller (NFS Server)
#   rpi02.local - Worker-1 (Pi-hole integration)
#   rpi03.local - Worker-2
#   rpi04.local - Worker-3

[all:vars]
ansible_user=brianingram
cluster_name="Raspberry-Pi-Cluster"
controller_ip=rk01.local
storage_controller_ip=rk01.local
pihole_ip=rpi02.local
loadbalancer_ip=rpi03.local
redis_password="cluster_queue"
grafana_admin_password="admin"

# ==========================================
# NODE DEFINITIONS
# ==========================================

[common]
# All nodes receive common configuration (SSH, firewall, etc.)
rk01.local
rpi02.local
rpi03.local
rpi04.local

[controller]
# Monitoring hub - Prometheus, Grafana, DNS load balancer
rk01.local

[storage]
# NFS server and backup management
rk01.local

[workers]
# Job processing workers
rpi02.local
rpi03.local
rpi04.local

[loadbalancer]
# DNS load balancer with Pi-hole integration
rpi02.local