# Ansible Pi Cluster Inventory
# ============================
# Edit this file with your actual IP addresses!
#
# Default network topology:
#   192.168.1.5 - Load Balancer / DNS
#   192.168.1.10 - Controller (Monitoring Hub)
#   192.168.1.20 - Storage Controller (NFS Server)
#   192.168.1.30 - Worker-1 (Pi-hole integration)
#   192.168.1.31 - Worker-2
#   192.168.1.32 - Worker-3

[all:vars]
ansible_user=root
cluster_name="Raspberry-Pi-Cluster"
controller_ip=192.168.1.10
storage_controller_ip=192.168.1.20
pihole_ip=192.168.1.30
loadbalancer_ip=192.168.1.5
redis_password="cluster_queue"
grafana_admin_password="admin"

# ==========================================
# NODE DEFINITIONS
# ==========================================

[common]
# All nodes receive common configuration (SSH, firewall, etc.)
192.168.1.10 ansible_host=192.168.1.10
192.168.1.20 ansible_host=192.168.1.20
192.168.1.30 ansible_host=192.168.1.30
192.168.1.31 ansible_host=192.168.1.31
192.168.1.32 ansible_host=192.168.1.32

[controller]
# Monitoring hub - Prometheus, Grafana, DNS load balancer
192.168.1.10 ansible_host=192.168.1.10

[storage]
# NFS server and backup management
192.168.1.20 ansible_host=192.168.1.20

[workers]
# Job processing workers
192.168.1.30 ansible_host=192.168.1.30
192.168.1.31 ansible_host=192.168.1.31
192.168.1.32 ansible_host=192.168.1.32

[loadbalancer]
# DNS load balancer with Pi-hole integration
192.168.1.5 ansible_host=192.168.1.5